<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEATWORK 2</title>

    <link rel="stylesheet" href="https://pyscript.net/releases/2025.3.1/core.css">
    <script type="module" src="https://pyscript.net/releases/2025.3.1/core.js"></script>

    <style>
      body {
    background: linear-gradient(135deg, #ffe4ec, #ffd6e8, #fff0f5);
    color: #5a4a4a;
    font-family: 'Courier New', Courier, monospace;
    display: flex;
    justify-content: center;
    padding-top: 60px;
}


.container {
    width: 90%;
    max-width: 600px;
    border: 2px solid #f7b6c8;
    padding: 25px;
    background: #fff6fa;
    box-shadow: 8px 8px 0px #f9c5d1;
    border-radius: 16px;
}


h2 {
    border-bottom: 2px solid #f7b6c8;
    padding-bottom: 10px;
    color: #d96c8c;
    letter-spacing: 1px;
}

.input-group {
    margin-bottom: 20px;
}

input {
    background: #fff;
    border: 1px solid #f3b6c8;
    color: #5a4a4a;
    padding: 10px;
    width: 95%;
    margin-bottom: 10px;
    border-radius: 10px;
    outline: none;
    transition: 0.2s ease;
}

input:focus {
    border-color: #ff9ebb;
    box-shadow: 0 0 6px #ffd1dc;
}

.controls {
    display: flex;
    gap: 10px;
}

button {
    flex: 1;
    padding: 12px;
    cursor: pointer;
    font-weight: bold;
    border: none;
    border-radius: 12px;
    transition: 0.15s ease;
}

.btn-primary {
    background: #ff9ebb;
    color: white;
}

.btn-primary:hover {
    background: #ff7fa7;
}

.btn-secondary {
    background: #f7c6d8;
    color: #5a4a4a;
}

.btn-secondary:hover {
    background: #f3b2c7;
}

button:active {
    transform: scale(0.98);
}

#results-box {
    margin-top: 30px;
    padding: 15px;
    background: #fff;
    border-left: 5px solid #ff9ebb;
    min-height: 50px;
    border-radius: 10px;
}
    
    </style>
</head>

<body>
    <div class="container">
        <h2>Grade 10 Classmate System</h2>

        <div class="input-group">
            <input type="text" id="inp_name" placeholder="Full Name">
            <input type="text" id="inp_sec" placeholder="Class Section">
            <input type="text" id="inp_fav" placeholder="Subject Interest">
        </div>

        <div class="controls">
          <button class="btn-primary" py-click="register_student">ADD STUDENT</button>
          <button class="btn-secondary" py-click="render_all">SHOW STUDENTS</button>
        </div>

        <div id="results-box">Waiting for input...</div>
    </div>

    <py-script src="main.py"></py-script>
</body>
</html>
